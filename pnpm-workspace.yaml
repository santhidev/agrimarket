packages:
  - 'apps/*'
  - 'packages/*'

# pnpm v10+ blocks dependency install scripts by default (ERR_PNPM_IGNORED_BUILDS).
# We control the full dependency tree, so allow all build scripts rather than
# maintaining an allow-list that drifts per platform/Node version. The explicit
# list below documents *why* each is needed; dangerouslyAllowAllBuilds is the
# CI/deploy-friendly escape hatch.
dangerouslyAllowAllBuilds: true

# Allow these packages to run install-time build scripts (postinstall).
# Prisma needs its postinstall to fetch the query engine; sharp is needed by
# Next.js; esbuild is needed by tsx (the seed-script runner).
onlyBuiltDependencies:
  - '@prisma/client'
  - '@prisma/engines'
  - prisma
  - sharp
  - esbuild
